services:
  api:
    image: ${API_IMAGE}:${API_TAG}
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT}:3001"
    env_file:
      - ../api/.env
    environment:
      HOST: 0.0.0.0
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    networks:
      - soulmate-net

  web:
    image: ${WEB_IMAGE}:${WEB_TAG}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - soulmate-net

volumes:
  api-data:
    name: ${PROJECT_NAME}-api-data

networks:
  soulmate-net:
    name: ${PROJECT_NAME}-net
    ipam:
      config:
        - subnet: ${PROJECT_SUBNET}
